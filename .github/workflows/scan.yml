name: Bithumb Bison Alert Scan

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: bison-bithumb-scan
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Run scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PORTFOLIO_YAML_BASE64: ${{ secrets.PORTFOLIO_YAML_BASE64 }}
        run: python -m bison_bot.main --once --max-runtime-seconds 240

      - name: Commit alert state
        if: always()
        run: |
          if [ -n "$(git status --porcelain state/sent_signals.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/sent_signals.json
            git commit -m "chore: update sent alert state" || true
            git push || true
          else
            echo "No state changes to commit."
          fi
